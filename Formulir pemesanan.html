<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Pemesanan Jasa Tour</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  
  <nav>
    <h1>Formulir Pemesanan Jasa Tour</h1>
    <ul>
      <li><a href="index.html">Kembali ke Home</a></li>
    </ul>
  </nav>
</header>

<main class="container">

<form id="orderForm" class="card">

<section>
  <h3>Data Pribadi</h3>

  <div class="form-group">
    <label>Nama Lengkap:</label>
    <input type="text" name="nama" required>
  </div>

  <div class="form-group">
    <label>Email:</label>
    <input type="email" name="email" required>
  </div>
  
  <div class="form-group">
    <label>Password Akun:</label>
    <input type="password" name="pass" required>
  </div>

  <div class="form-group">
    <label>Nomor WhatsApp:</label>
    <input type="tel" name="telepon">
  </div>
 <div class="form-group">
    <label>Pilihan Destinasi:</label>
    <select name="destinasi" required>
      <option value="">-- Pilih Destinasi --</option>
      <option>Lokananta</option>
      <option>Patung Slamet Riyadi</option>
      <option>Keraton Kasunanan Surakarta</option>
      <option>Kampung Batik Laweyan</option>
      <option>De Tjolomadoe</option>
      <option>Pasar Triwindu</option>
      <option>Pura Mangkunegaran</option>
    </select>
  </div>
  
  <div class="form-group">
    <label>Jumlah Tiket:</label>
    <input type="number" name="jumlah_tiket" min="1" required>
  </div>

 
</section>

<section>
  <h3>Detail Pesanan</h3>

  <div class="form-group">
    <label>Tanggal:</label>
    <input type="date" name="tanggal" required>
  </div>

  <div class="form-group">
    <label>Jam:</label>
    <input type="time" name="jam" required>
  </div>

  <div class="form-group">
    <label>Jumlah Personil:</label>
    <input type="number" name="jumlah_personil" min="1" max="50" required>
  </div>

  <div class="form-group">
    <label>Pilihan Hotel:</label>
    <select name="hotel" required>
      <option>Alila Solo</option>
      <option>The Royal Surakarta Heritage - Handwritten Collection</option>
      <option>Swiss-Belhotel Solo</option>
      <option>Solo Paragon Hotel & Residences</option>
      <option>The Sunan Hotel Solo</option>
      <option>HARRIS Hotel & Convention Solo</option>
      <option>POP! Hotel Solo</option>
      <option>Megaland Hotel Solo</option>
      <option>Diamond Hotel Solo</option>
    </select>
  </div>

  <div class="form-group">
    <label>Pilihan Transportasi:</label>
    <select name="transportasi" required>
      <option>Mobil Pribadi</option>
      <option>Travel / Shuttle</option>
      <option>Bus Pariwisata</option>
      <option>Ojek Online</option>
      <option>Sepeda / Motor</option>
    </select>
  </div>
</section>

<section>
  <h3>Lokasi Penjemputan</h3>

  <div class="form-group">
    <label>Provinsi:</label>
    <select name="provinsi" required>
      <option>Jawa Barat</option>
      <option>DKI Jakarta</option>
      <option>Jawa Tengah</option>
    </select>
  </div>

  <div class="form-group">
    <label>Kota:</label>
    <select name="kota" required>
      <option>Bandung</option>
      <option>Jakarta</option>
      <option>Semarang</option>
      <option>Surakarta</option>
    </select>
  </div>

  <div class="form-group">
    <label>Kelengkapan Lokasi / Meeting Point:</label>
    <input type="text" name="meeting_point" required>
  </div>
</section>

<section>
  <h3>Pembayaran Transaksi</h3>

  <div class="form-group">
    <label>Metode Pembayaran:</label>
    <select name="ewallet" required>
      <option>Dana</option>
      <option>OVO</option>
      <option>Gopay</option>
      <option>Transfer Bank</option>
    </select>
  </div>
</section>

<section>
  <input type="reset" value="Kosongkan Form">
  <input type="submit" value="Kirim Pesanan">
</section>

</form>

<div id="result" style="display:none; margin-top:20px;"></div>

</main>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const formData = new FormData(this);
  const data = {};
  formData.forEach((value, key) => {
    data[key] = value;
  });
  localStorage.setItem("pesananTerakhir", JSON.stringify(data));
  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "<pre>" + JSON.stringify(data, null, 2) + "</pre>";

  alert("Pesanan " + data.nama + " berhasil disimpan!");
});
</script>

</body>
</html>
